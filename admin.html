<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Visitas</title>
  <style>
    body{margin:0;font-family:'Cormorant Garamond',serif;background:#080812;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
    .card{width:100%;max-width:720px;background:rgba(10,10,25,.95);border:1px solid rgba(255,255,255,.1);border-radius:24px;box-shadow:0 24px 80px rgba(0,0,0,.55);padding:28px;}
    h1{font-size:2.6rem;margin:0 0 16px;color:#ffd5e9;}
    p{line-height:1.8;color:#d9d9ff;}
    label{display:block;margin:18px 0 8px;font-weight:600;color:#f4f4ff;}
    input[type=password]{width:100%;padding:14px 16px;border:1px solid rgba(255,255,255,.14);border-radius:14px;background:rgba(255,255,255,.04);color:#fff;font-size:1rem;}
    button{margin-top:18px;padding:14px 22px;border:none;border-radius:999px;background:linear-gradient(135deg,#ff4d90,#ff91c2);color:#fff;font-size:1rem;font-weight:700;cursor:pointer;transition:transform .2s ease,box-shadow .2s ease;}
    button:hover{transform:translateY(-2px);box-shadow:0 18px 30px rgba(255,77,144,.22);}
    .info{margin-top:24px;white-space:pre-wrap;max-height:420px;overflow:auto;padding:18px 16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:18px;color:#f8f3ff;font-size:.95rem;}
    .error{color:#ff8db8;margin-top:12px;}
    .note{font-size:.95rem;color:#c8c8df;margin-top:10px;}
    .hidden{display:none;}
    a{color:#ffd5e9;text-decoration:none;}
  </style>
</head>
<body>
  <div class="card">
    <h1>Administración de visitas</h1>
    <p>Ingresa la contraseña para ver el total de visitas y el registro de accesos.</p>
    <label for="password">Contraseña</label>
    <input id="password" type="password" placeholder="Contraseña sencilla" autocomplete="off">
    <button id="loginBtn">Entrar</button>
    <div class="error hidden" id="errorMsg">Contraseña incorrecta.</div>
    <div class="note">Contraseña de prueba: <strong>corina123</strong></div>
    <div class="info hidden" id="result"></div>
  </div>

  <script>
    const loginBtn = document.getElementById('loginBtn');
    const passwordInput = document.getElementById('password');
    const errorMsg = document.getElementById('errorMsg');
    const resultEl = document.getElementById('result');

    function showError(message) {
      errorMsg.textContent = message;
      errorMsg.classList.remove('hidden');
      resultEl.classList.add('hidden');
    }

    function showResult(text) {
      resultEl.textContent = text;
      resultEl.classList.remove('hidden');
      errorMsg.classList.add('hidden');
    }

    loginBtn.addEventListener('click', () => {
      const password = passwordInput.value.trim();
      if (!password) {
        showError('Por favor ingresa la contraseña.');
        return;
      }

      fetch('/admin/data', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({password})
      })
        .then((response) => {
          if (!response.ok) throw new Error('no-auth');
          return response.json();
        })
        .then((data) => {
          const lines = [
            `Visitas totales: ${data.count}`,
            '',
            'Registros de accesos:',
            data.logs || 'No hay registros disponibles.'
          ];
          showResult(lines.join('\n'));
        })
        .catch(() => {
          showError('Contraseña incorrecta o error de conexión.');
        });
    });
  </script>
</body>
</html>
